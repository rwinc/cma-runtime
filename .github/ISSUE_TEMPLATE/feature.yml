name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 - Must have (blocks milestone)
        - P2 - Should have (milestone goal)
        - P3 - Nice to have
        - P4 - Future consideration
  - type: checkboxes
    id: definition-of-done
    attributes:
      label: Definition of Done
      description: Check these when complete before closing.
      options:
        - label: Code implemented, tests added/updated
        - label: PR reviewed and approved, CI green
        - label: Docs updated (if behavior changed)
        - label: Deployed to QA, validated by non-builder
        - label: Acceptance criteria met
