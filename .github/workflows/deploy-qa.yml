# Richwood — QA Deploy
# Triggered on push to develop. Runs CI checks, then deploys.
#
# Configure per project by editing the env block below.
# Synced from rw-meta/shared. Edit the env block in project repos only.

name: Deploy QA

on:
  push:
    branches: [develop]
  # Manual trigger so we can redeploy QA without forcing a no-op commit
  # (e.g. to pick up rotated secrets or rerun after a transient failure).
  workflow_dispatch:

concurrency:
  group: deploy-qa
  cancel-in-progress: false  # don't cancel in-progress deploys

# ─── PROJECT CONFIG (cma-runtime) ────────────────────────────────────────────
# This fork uses the top-level wrangler.jsonc as QA (worker name
# `cma-runtime-qa`), not wrangler env blocks — see CLAUDE.md → Deploy.
# WORKER_ENV stays unset so the deploy step omits `--env` and falls back
# to top-level config; the workflow body has a small `if -n WORKER_ENV`
# guard to support both modes.
env:
  DEPLOY_ENV: qa
  NODE_VERSION: "22"

  # WORKER_ENV intentionally unset — top-level wrangler.jsonc is QA.

  D1_DATABASE: cma-runtime-qa

  # No Pages frontend — assets are served via Workers static-asset
  # binding (see wrangler.jsonc `assets`). PAGES_PROJECT / VITE_API_URL
  # stay unset.

  HEALTH_URL: https://cma-runtime-qa.richwood.workers.dev

# ─── WORKFLOW ─────────────────────────────────────────────────────────────────

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure npm for GitHub Packages
        if: hashFiles('.npmrc') != ''
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_PKG_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.NPM_PKG_TOKEN }}

      - name: Type check
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present

  deploy:
    name: Deploy to QA
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: qa

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure npm for GitHub Packages
        if: hashFiles('.npmrc') != ''
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_PKG_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.NPM_PKG_TOKEN }}

      # ── Detect project layout ────────────────────────────────────────────
      # Finds wrangler.toml (Worker dir) and vite.config.* (frontend dir)
      # automatically. Works with any directory structure.
      #
      # Worker: prefers dirs named api/gateway/router/backend over web/shell/frontend.
      # Frontend: prefers dirs named web/shell/frontend/ui, skips packages/.
      - name: Detect layout
        id: layout
        run: |
          # Find all wrangler.toml files (excluding node_modules)
          WRANGLER_FILES=$(find . -name "wrangler.toml" -not -path "*/node_modules/*")

          if [ -n "$WRANGLER_FILES" ]; then
            # Prefer paths containing api, gateway, or backend (Worker dirs)
            # Fall back to first match if none match the preference
            WRANGLER=$(echo "$WRANGLER_FILES" | grep -E '/(api|gateway|router|backend)/' | head -1)
            [ -z "$WRANGLER" ] && WRANGLER=$(echo "$WRANGLER_FILES" | head -1)
            API_DIR=$(dirname "$WRANGLER" | sed 's|^\./||')
            echo "api_dir=$API_DIR" >> "$GITHUB_OUTPUT"
            echo "Detected Worker dir: $API_DIR"
          else
            echo "api_dir=." >> "$GITHUB_OUTPUT"
            echo "No wrangler.toml found, defaulting to root"
          fi

          # Find vite.config.* for deployable frontend apps
          # Prefer dirs named web, shell, frontend, or ui
          # Skip packages/ (libraries) and canonical/ (docs)
          VITE_FILES=$(find . -name "vite.config.*" \
            -not -path "*/node_modules/*" \
            -not -path "*/packages/*" \
            -not -path "*/canonical/*")

          if [ -n "$VITE_FILES" ]; then
            VITE=$(echo "$VITE_FILES" | grep -E '/(web|shell|frontend|ui)/' | head -1)
            [ -z "$VITE" ] && VITE=$(echo "$VITE_FILES" | head -1)
            WEB_DIR=$(dirname "$VITE" | sed 's|^\./||')
            echo "web_dir=$WEB_DIR" >> "$GITHUB_OUTPUT"
            echo "Detected frontend dir: $WEB_DIR"
          else
            echo "web_dir=" >> "$GITHUB_OUTPUT"
            echo "No frontend detected"
          fi

      # ── Install sub-project dependencies ────────────────────────────────
      # Root `npm ci` only installs root deps. If the Worker or frontend
      # lives in a sub-directory with its own package-lock.json (i.e. it's
      # not in root workspaces), its deps must be installed separately.
      # No-op for projects whose Worker/UI are at root or in workspaces.
      #
      # Both GITHUB_NPM_TOKEN and GITHUB_PACKAGES_TOKEN are set because
      # project .npmrc files use both names across the portfolio.
      - name: Install sub-project dependencies
        run: |
          install_if_needed() {
            dir="$1"
            label="$2"

            if [ -z "$dir" ] || [ "$dir" = "." ]; then
              echo "$label uses root dependencies"
              return 0
            fi

            if [ -f "$dir/package-lock.json" ]; then
              echo "Installing $label dependencies in $dir"
              (cd "$dir" && npm ci)
            else
              echo "$label has no standalone package-lock.json"
            fi
          }

          install_if_needed "${{ steps.layout.outputs.api_dir }}" "Worker"
          install_if_needed "${{ steps.layout.outputs.web_dir }}" "Frontend"
        env:
          GITHUB_NPM_TOKEN: ${{ secrets.NPM_PKG_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.NPM_PKG_TOKEN }}

      # ── Build (runs prebuild → ensure-kv/ensure-d1/sync-vpc/copy-redoc, then vite) ──
      # cma-runtime fork: the deploy path depends on `npm run build`. The
      # `prebuild` script populates the empty KV/D1 IDs in wrangler.jsonc
      # (via the ensure-* scripts) and the build step itself produces
      # `public/` for the worker's static-asset binding. Without this,
      # wrangler validation rejects the empty IDs and the deploy ships
      # without assets. Mirrors what `npm run deploy` does locally.
      - name: Build (prebuild + vite)
        working-directory: ${{ steps.layout.outputs.api_dir }}
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      # ── D1 migrations (before deploy) ───────────────────────────────────
      # cma-runtime fork: WORKER_ENV is intentionally unset (top-level
      # wrangler.jsonc IS the QA config). Pass `--env` only when set,
      # so projects using env blocks still work via the same template.
      - name: Apply D1 migrations
        if: env.D1_DATABASE != ''
        working-directory: ${{ steps.layout.outputs.api_dir }}
        run: |
          if [ -n "${WORKER_ENV}" ]; then
            npx wrangler d1 migrations apply "${D1_DATABASE}" --env "${WORKER_ENV}" --remote
          else
            npx wrangler d1 migrations apply "${D1_DATABASE}" --remote
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      # ── Deploy Worker ────────────────────────────────────────────────────
      # cma-runtime fork: removed `if: env.WORKER_ENV != ''` guard since
      # the worker deploys under the top-level wrangler.jsonc config
      # when WORKER_ENV is unset.
      - name: Deploy Worker
        working-directory: ${{ steps.layout.outputs.api_dir }}
        run: |
          if [ -n "${WORKER_ENV}" ]; then
            npx wrangler deploy --env "${WORKER_ENV}"
          else
            npx wrangler deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      # ── Build + Deploy Pages frontend ────────────────────────────────────
      - name: Build frontend
        if: env.PAGES_PROJECT != '' && steps.layout.outputs.web_dir != ''
        working-directory: ${{ steps.layout.outputs.web_dir }}
        run: npm run build:${{ env.DEPLOY_ENV }} 2>/dev/null || npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_URL }}

      - name: Deploy frontend
        if: env.PAGES_PROJECT != '' && steps.layout.outputs.web_dir != ''
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.PAGES_PROJECT }} --branch=${{ env.PAGES_BRANCH }}
          workingDirectory: ${{ steps.layout.outputs.web_dir }}

      # ── Health check ─────────────────────────────────────────────────────
      # cma-runtime fork: fails the deploy job if /health doesn't return
      # 200 after 5 attempts. Upstream template emits a warning and exits
      # 0, which let bad deploys ship green — defeats the point.
      - name: Health check
        if: env.HEALTH_URL != ''
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.HEALTH_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Health check passed"; exit 0; fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep $((i * 2))
          done
          echo "::error::Health check failed after 5 attempts — last status was $STATUS"
          exit 1
