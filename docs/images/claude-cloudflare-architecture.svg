<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-cf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F6821F"/>
    </marker>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E40AF"/>
    </marker>

    <!-- Subtle shadow -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <!-- Platform background gradients (Anthropic cream + Cloudflare warm) -->
    <linearGradient id="claude-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F2EBE0"/>
    </linearGradient>
    <linearGradient id="cf-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF7EC"/>
      <stop offset="100%" stop-color="#FFE8C8"/>
    </linearGradient>
    <linearGradient id="ext-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F6"/>
    </linearGradient>
  </defs>

  <!-- ============== SINGLE REQUEST LINE (drawn FIRST so boxes overlay it) ============== -->
  <!-- Sandbox B -> CF VPC endpoint -> External VPC endpoint -> service -->
  <path d="M 870 570 L 1050 570 L 1180 390 L 1290 390 L 1320 395"
        fill="none" stroke="#1E40AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrow-request)"/>
  <text x="1075" y="465" font-size="13" font-weight="600" fill="#1E40AF" transform="rotate(-54 1075 465)">single outbound request</text>

  <!-- ============== CLAUDE PLATFORM ============== -->
  <g id="claude-platform">
    <rect x="40" y="80" width="300" height="600" rx="18" ry="18"
          fill="url(#claude-bg)" stroke="#D97757" stroke-width="2.5"/>
    <text x="60" y="62" font-size="22" font-weight="700" fill="#A8553A">Claude Platform</text>

    <!-- Session A -->
    <g filter="url(#card-shadow)">
      <rect x="70" y="130" width="240" height="220" rx="14" ry="14"
            fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
      <text x="90" y="158" font-size="15" font-weight="600" fill="#A8553A">session A</text>
      <circle cx="190" cy="250" r="62" fill="#FAF1EB" stroke="#D97757" stroke-width="2"/>
      <text x="190" y="246" text-anchor="middle" font-size="14" font-weight="600" fill="#A8553A">Agent</text>
      <text x="190" y="265" text-anchor="middle" font-size="14" font-weight="600" fill="#A8553A">Loop</text>
    </g>

    <!-- Session B -->
    <g filter="url(#card-shadow)">
      <rect x="70" y="410" width="240" height="220" rx="14" ry="14"
            fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
      <text x="90" y="438" font-size="15" font-weight="600" fill="#A8553A">session B</text>
      <circle cx="190" cy="530" r="62" fill="#FAF1EB" stroke="#D97757" stroke-width="2"/>
      <text x="190" y="526" text-anchor="middle" font-size="14" font-weight="600" fill="#A8553A">Agent</text>
      <text x="190" y="545" text-anchor="middle" font-size="14" font-weight="600" fill="#A8553A">Loop</text>
    </g>
  </g>

  <!-- ============== CLOUDFLARE DEV PLATFORM ============== -->
  <g id="cf-platform">
    <rect x="400" y="80" width="700" height="600" rx="18" ry="18"
          fill="url(#cf-bg)" stroke="#F6821F" stroke-width="2.5"/>
    <text x="420" y="62" font-size="22" font-weight="700" fill="#B65D0F">Cloudflare Dev Platform</text>
  </g>

  <!-- ============== CROSS-PLATFORM EVENTS: Session A <-> Worker <-> Sandbox A ============== -->
  <!-- Session A <-> Worker left -->
  <path d="M 310 240 C 380 240 400 360 440 360" fill="none"
        stroke="#374151" stroke-width="2"
        marker-end="url(#arrow-neutral)" marker-start="url(#arrow-neutral)"/>
  <!-- Worker right <-> Sandbox A left -->
  <path d="M 640 350 C 670 280 670 230 700 200" fill="none"
        stroke="#374151" stroke-width="2"
        marker-end="url(#arrow-neutral)" marker-start="url(#arrow-neutral)"/>
  <text x="345" y="280" font-size="13" font-weight="500" fill="#374151">tool calls &amp; events</text>

  <!-- ============== CROSS-PLATFORM EVENTS: Session B <-> Worker <-> Sandbox B ============== -->
  <!-- Session B <-> Worker left -->
  <path d="M 310 520 C 380 520 400 420 440 420" fill="none"
        stroke="#374151" stroke-width="2"
        marker-end="url(#arrow-neutral)" marker-start="url(#arrow-neutral)"/>
  <!-- Worker right <-> Sandbox B left -->
  <path d="M 640 430 C 670 490 670 540 700 570" fill="none"
        stroke="#374151" stroke-width="2"
        marker-end="url(#arrow-neutral)" marker-start="url(#arrow-neutral)"/>
  <text x="345" y="500" font-size="13" font-weight="500" fill="#374151">tool calls &amp; events</text>

  <!-- ============== LIFECYCLE DOTTED LINES (Worker -> Sandboxes) ============== -->
  <!-- Worker top -> Sandbox A bottom -->
  <path d="M 580 330 L 770 260" fill="none"
        stroke="#F6821F" stroke-width="2" stroke-dasharray="2 5" stroke-linecap="round"
        marker-end="url(#arrow-cf)"/>
  <!-- Worker bottom -> Sandbox B top -->
  <path d="M 580 450 L 770 510" fill="none"
        stroke="#F6821F" stroke-width="2" stroke-dasharray="2 5" stroke-linecap="round"
        marker-end="url(#arrow-cf)"/>
  <!-- Lifecycle label (single, between worker and sandbox A area) -->
  <text x="595" y="295" font-size="12" font-style="italic" font-weight="600" fill="#B65D0F">Launches + controls lifecycle</text>

  <!-- ============== WORKER (drawn AFTER events lines so it sits on top) ============== -->
  <g filter="url(#card-shadow)">
    <rect x="440" y="330" width="200" height="120" rx="14" ry="14"
          fill="#FFFFFF" stroke="#F6821F" stroke-width="2.5"/>
    <text x="540" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#B65D0F">Worker-based</text>
    <text x="540" y="404" text-anchor="middle" font-size="15" font-weight="700" fill="#B65D0F">control plane</text>
  </g>

  <!-- ============== SANDBOXES & TOOLS ============== -->
  <g>
    <!-- Sandbox A -->
    <g filter="url(#card-shadow)">
      <rect x="700" y="140" width="170" height="120" rx="14" ry="14"
            fill="#FFFFFF" stroke="#F6821F" stroke-width="2"/>
      <text x="785" y="208" text-anchor="middle" font-size="16" font-weight="600" fill="#B65D0F">sandbox A</text>
    </g>

    <!-- Sandbox B -->
    <g filter="url(#card-shadow)">
      <rect x="700" y="510" width="170" height="120" rx="14" ry="14"
            fill="#FFFFFF" stroke="#F6821F" stroke-width="2"/>
      <text x="785" y="578" text-anchor="middle" font-size="16" font-weight="600" fill="#B65D0F">sandbox B</text>
    </g>

    <!-- Email service -->
    <g filter="url(#card-shadow)">
      <rect x="920" y="140" width="130" height="100" rx="14" ry="14"
            fill="#FFFFFF" stroke="#F6821F" stroke-width="2"/>
      <text x="985" y="185" text-anchor="middle" font-size="15" font-weight="600" fill="#B65D0F">email</text>
      <text x="985" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#B65D0F">service</text>
    </g>

    <!-- Browser Run -->
    <g filter="url(#card-shadow)">
      <rect x="920" y="325" width="130" height="100" rx="14" ry="14"
            fill="#FFFFFF" stroke="#F6821F" stroke-width="2"/>
      <text x="985" y="370" text-anchor="middle" font-size="15" font-weight="600" fill="#B65D0F">Browser</text>
      <text x="985" y="390" text-anchor="middle" font-size="15" font-weight="600" fill="#B65D0F">Run</text>
    </g>

    <!-- VPC endpoint (CF side) - drawn over the single request line -->
    <g filter="url(#card-shadow)">
      <rect x="920" y="510" width="130" height="120" rx="14" ry="14"
            fill="#FFFFFF" stroke="#F6821F" stroke-width="2"/>
      <text x="985" y="565" text-anchor="middle" font-size="15" font-weight="600" fill="#B65D0F">VPC</text>
      <text x="985" y="585" text-anchor="middle" font-size="15" font-weight="600" fill="#B65D0F">endpoint</text>
    </g>
  </g>

  <!-- ============== TOOL CALL ARROWS (Sandbox -> Tools) ============== -->
  <!-- Sandbox A -> Email service -->
  <path d="M 870 190 L 920 190" fill="none"
        stroke="#F6821F" stroke-width="2" marker-end="url(#arrow-cf)"/>
  <text x="876" y="180" font-size="11" font-weight="500" fill="#B65D0F">tool call</text>

  <!-- Sandbox A -> Browser Run -->
  <path d="M 870 240 L 920 360" fill="none"
        stroke="#F6821F" stroke-width="2" marker-end="url(#arrow-cf)"/>
  <text x="878" y="305" font-size="11" font-weight="500" fill="#B65D0F" transform="rotate(60 878 305)">tool call</text>

  <!-- Sandbox B -> Browser Run -->
  <path d="M 870 530 L 920 410" fill="none"
        stroke="#F6821F" stroke-width="2" marker-end="url(#arrow-cf)"/>
  <text x="878" y="465" font-size="11" font-weight="500" fill="#B65D0F" transform="rotate(-65 878 465)">tool call</text>

  <!-- ============== EXTERNAL CLOUD ============== -->
  <g id="external">
    <rect x="1160" y="280" width="300" height="220" rx="18" ry="18"
          fill="url(#ext-bg)" stroke="#4B5563" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="1180" y="262" font-size="15" font-weight="600" fill="#374151">external cloud or on-prem DC</text>

    <!-- VPC endpoint (external side) - drawn over the single request line -->
    <g filter="url(#card-shadow)">
      <rect x="1180" y="350" width="110" height="80" rx="12" ry="12"
            fill="#FFFFFF" stroke="#F6821F" stroke-width="2"/>
      <text x="1235" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#B65D0F">VPC</text>
      <text x="1235" y="403" text-anchor="middle" font-size="13" font-weight="600" fill="#B65D0F">endpoint</text>
    </g>

    <!-- service -->
    <g filter="url(#card-shadow)">
      <rect x="1320" y="360" width="100" height="70" rx="12" ry="12"
            fill="#FFFFFF" stroke="#4B5563" stroke-width="2"/>
      <text x="1370" y="402" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">service</text>
    </g>
  </g>

  <!-- ============== FOOTER ============== -->
  <text x="40" y="730" font-size="12" fill="#6B7280">Claude Managed Agents on Cloudflare — agent loop runs on Anthropic, execution runs on Cloudflare.</text>
</svg>
