<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Reference — Cloudflare Claude Agents</title>
    <!--
      Standalone Redoc page served directly at /redoc.html. We embed
      Redoc's standalone bundle (copied to this directory by
      scripts/copy-redoc.mjs at prebuild time) instead of importing the
      React component because Redoc's CJS internals don't cleanly
      survive Vite's chunked bundling — the standalone bundle is
      pre-baked for the browser and Just Works.

      The page is loaded as a top-level navigation from the dashboard's
      "API Reference" sidebar entry — not inside an iframe — so the
      browser's back button returns the user to the previous dashboard
      page naturally.

      Floating shortcut to /api/openapi.json sits in the top-right so
      CLI / tooling users can grab the spec directly.
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fff;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }

      /* Floating actions overlaid on Redoc's header. Positioned so they
         clear the menu trigger Redoc renders on narrow viewports. */
      .api-ref-actions {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 10;
        display: flex;
        gap: 8px;
        font-size: 13px;
      }

      .api-ref-actions a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #ffffffd9;
        backdrop-filter: blur(6px);
        color: #1f1f1f;
        text-decoration: none;
        border: 1px solid #e5e5e5;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }

      .api-ref-actions a:hover {
        background: #ffffff;
        border-color: #c8c8c8;
      }

      .api-ref-actions a svg {
        width: 14px;
        height: 14px;
      }
    </style>
  </head>
  <body>
    <div class="api-ref-actions">
      <a
        href="/api/openapi.json"
        download="openapi.json"
        title="Download the OpenAPI 3.1 document (also at /openapi.json)"
      >
        ↓ openapi.json
      </a>
    </div>
    <redoc spec-url="/api/openapi.json"></redoc>
    <script src="/redoc.standalone.js"></script>
  </body>
</html>
